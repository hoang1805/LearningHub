# LearningHub dev infrastructure.
# Run from the repo root so the root .env is picked up:
#   docker compose --env-file .env -f infra/docker-compose.yml up -d
# Every variable has a dev-safe default, so it also starts without a .env.
# Judge0 is a separate, heavier stack: infra/judge0/docker-compose.yml.
# Ollama is NOT containerized — the owner's existing WSL install serves
# localhost:11434 (see infra/README.md).

name: learninghub

services:
  postgres:
    image: postgres:16-alpine
    container_name: lh-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learning_hub}
      POSTGRES_USER: ${POSTGRES_USER:-learninghub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: lh-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lh-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: lh-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-learninghub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-change-me}
    ports:
      - "5672:5672"   # AMQP (grading job queues)
      - "61613:61613" # STOMP (Spring broker relay)
      - "15672:15672" # management UI
    volumes:
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-learninghub}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-me}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: creates the app bucket, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: lh-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-learninghub} ${MINIO_SECRET_KEY:-change-me} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-learninghub} &&
      echo 'bucket ready'
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: lh-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

volumes:
  pg_data:
  mongo_data:
  rabbitmq_data:
  minio_data:
