################################################################################
# Judge0 configuration (trimmed from the stock judge0.conf)
# CHANGE BOTH PASSWORDS BEFORE FIRST START.
# Full reference: https://github.com/judge0/judge0/blob/master/judge0.conf
################################################################################

# --- Redis (internal to the Judge0 stack) ---
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=lh-judge0-change-me

# --- PostgreSQL (internal to the Judge0 stack) ---
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=lh-judge0-change-me

# --- Server ---
# No auth tokens in dev; the API is only reachable from localhost:2358.
# For prod, set AUTHN_HEADER/AUTHN_TOKEN and put Judge0 on a private network.

# --- Submission limits (per-question config can lower these) ---
MAX_CPU_TIME_LIMIT=15
MAX_MEMORY_LIMIT=512000
MAX_QUEUE_SIZE=100
ENABLE_WAIT_RESULT=true

# --- Workers ---
COUNT=2
INTERVAL=0.1
